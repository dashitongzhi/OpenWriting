name: PR Merge Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - codex/xcode-migration
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-merge-checks-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke checks (macOS)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR diff whitespace
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
          git diff --check "origin/${{ github.base_ref }}...HEAD"

      - name: Show Xcode toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Install smoke-check dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi

      - name: Run Codex PR review checks
        if: ${{ github.event_name == 'pull_request' }}
        run: zsh -f ./scripts/run-codex-pr-review-checks.sh

      - name: Verify architecture indexes and test target membership
        run: |
          zsh -f ./scripts/check-index-coverage.sh
          zsh -f ./scripts/verify-xctest-membership.sh

      - name: Run smoke checks
        env:
          DERIVED_DATA_PATH: ${{ runner.temp }}/OpenWritingDerivedData-${{ github.run_id }}-${{ github.run_attempt }}
        run: zsh -f ./scripts/run-smoke-checks.sh

      - name: Run hosted XCTest launch guard
        env:
          DERIVED_DATA_PATH: ${{ runner.temp }}/OpenWritingHostedXCTestGuardDerivedData-${{ github.run_id }}-${{ github.run_attempt }}
        run: zsh -f ./scripts/run-hosted-xctest-guard.sh

      - name: Run OpenWriting XCTest suite
        env:
          DERIVED_DATA_PATH: ${{ runner.temp }}/OpenWritingTestsDerivedData-${{ github.run_id }}-${{ github.run_attempt }}
        run: zsh -f ./scripts/run-tests.sh
